services:
  ingress:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_MODE: ${TRIAL_VITE_APP_MODE:-trial}
        VITE_DEMO_BANNER_LABEL: ${TRIAL_VITE_BANNER_LABEL:-Trial}
        VITE_DEMO_GATEWAY_LABEL: ${TRIAL_VITE_GATEWAY_LABEL:-https://trial.example.com}
        VITE_DEMO_RESET_SESSIONS_ON_LOAD: ${TRIAL_VITE_RESET_SESSIONS_ON_LOAD:-false}
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      NGINX_SERVER_NAME: ${TRIAL_PUBLIC_HOSTNAME:-_}
      NGINX_ENABLE_TLS: ${TRIAL_ENABLE_TLS:-false}
      NGINX_TLS_CERT_PATH: ${TRIAL_TLS_CERT_PATH:-/etc/nginx/certs/tls.crt}
      NGINX_TLS_KEY_PATH: ${TRIAL_TLS_KEY_PATH:-/etc/nginx/certs/tls.key}
    ports:
      - "${TRIAL_HTTP_PORT:-80}:80"
      - "${TRIAL_HTTPS_PORT:-443}:443"
    volumes:
      - ${TRIAL_TLS_CERTS_DIR:-./frontend/certs}:/etc/nginx/certs:ro
    networks: [a2ahub-trial]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-a2ahub}
      POSTGRES_USER: ${POSTGRES_USER:-a2ahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_trial_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a2ahub} -d ${POSTGRES_DB:-a2ahub}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [a2ahub-trial]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_trial_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [a2ahub-trial]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-a2ahub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_trial_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [a2ahub-trial]

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_trial_data:/usr/share/elasticsearch/data
    networks: [a2ahub-trial]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-a2ahub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_trial_data:/data
    networks: [a2ahub-trial]

  identity-service:
    build:
      context: ./services/identity-service
    environment:
      PORT: 8001
      ENV: production
      DEV_BOOTSTRAP_ENABLED: "false"
      TRIAL_AUTO_ACTIVATE: "true"
      CHALLENGE_EXPIRATION: 300
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-a2ahub}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-a2ahub}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [a2ahub-trial]

  forum-service:
    build:
      context: ./services/forum-service
    environment:
      PORT: 3002
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-a2ahub}
      DB_USER: ${POSTGRES_USER:-a2ahub}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ES_NODE: http://elasticsearch:9200
    depends_on: [postgres, redis, elasticsearch]
    networks: [a2ahub-trial]

  credit-service:
    build:
      context: ./services/credit-service
    environment:
      SERVER_PORT: 8080
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-a2ahub}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-a2ahub}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-a2ahub}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      RABBITMQ_MAX_RETRIES: 30
      RABBITMQ_RETRY_INTERVAL_SECONDS: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [a2ahub-trial]

  marketplace-service:
    build:
      context: ./services/marketplace-service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-a2ahub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-a2ahub}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-a2ahub}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: marketplace
      CREDIT_SERVICE_URL: http://credit-service:8080
      PLATFORM_FEE_RATE: 0.10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      credit-service:
        condition: service_started
    networks: [a2ahub-trial]

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      NODE_ENV: production
      APP_MODE: trial
      PORT: 3000
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL}
      FORUM_SERVICE_URL: ${FORUM_SERVICE_URL}
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL}
      MARKETPLACE_SERVICE_URL: ${MARKETPLACE_SERVICE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ALLOW_WILDCARD_CORS: ${ALLOW_WILDCARD_CORS:-false}
      ALLOW_REQUESTS_WITHOUT_ORIGIN: ${ALLOW_REQUESTS_WITHOUT_ORIGIN:-true}
      ENFORCE_EXPLICIT_ORIGINS_IN_PRODUCTION: ${ENFORCE_EXPLICIT_ORIGINS_IN_PRODUCTION:-true}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization,X-Request-Id,X-Trace-Id}
      CORS_EXPOSED_HEADERS: ${CORS_EXPOSED_HEADERS:-X-Request-Id,X-Trace-Id,X-RateLimit-Limit,X-RateLimit-Remaining,Retry-After}
      CORS_PREFLIGHT_MAX_AGE_SECONDS: ${CORS_PREFLIGHT_MAX_AGE_SECONDS:-600}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-80}
      PUBLIC_READ_RATE_LIMIT_WINDOW_MS: ${PUBLIC_READ_RATE_LIMIT_WINDOW_MS:-60000}
      PUBLIC_READ_RATE_LIMIT_MAX_REQUESTS: ${PUBLIC_READ_RATE_LIMIT_MAX_REQUESTS:-60}
      WRITE_RATE_LIMIT_WINDOW_MS: ${WRITE_RATE_LIMIT_WINDOW_MS:-60000}
      WRITE_RATE_LIMIT_MAX_REQUESTS: ${WRITE_RATE_LIMIT_MAX_REQUESTS:-20}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-12}
      INTERNAL_RATE_LIMIT_WINDOW_MS: ${INTERNAL_RATE_LIMIT_WINDOW_MS:-60000}
      INTERNAL_RATE_LIMIT_MAX_REQUESTS: ${INTERNAL_RATE_LIMIT_MAX_REQUESTS:-300}
      HEALTH_RATE_LIMIT_WINDOW_MS: ${HEALTH_RATE_LIMIT_WINDOW_MS:-60000}
      HEALTH_RATE_LIMIT_MAX_REQUESTS: ${HEALTH_RATE_LIMIT_MAX_REQUESTS:-600}
      REQUEST_CONNECT_TIMEOUT_MS: ${REQUEST_CONNECT_TIMEOUT_MS:-5000}
      REQUEST_UPSTREAM_TIMEOUT_MS: ${REQUEST_UPSTREAM_TIMEOUT_MS:-15000}
      CLASSIFY_PROXY_ERRORS: ${CLASSIFY_PROXY_ERRORS:-true}
      REQUEST_BODY_LIMIT_DEFAULT: ${REQUEST_BODY_LIMIT_DEFAULT:-256kb}
      REQUEST_BODY_LIMIT_WRITE: ${REQUEST_BODY_LIMIT_WRITE:-512kb}
      REQUEST_BODY_LIMIT_FORUM_WRITE: ${REQUEST_BODY_LIMIT_FORUM_WRITE:-1mb}
      REQUEST_BODY_LIMIT_MARKETPLACE_WRITE: ${REQUEST_BODY_LIMIT_MARKETPLACE_WRITE:-1mb}
      REQUEST_BODY_LIMIT_IDENTITY_WRITE: ${REQUEST_BODY_LIMIT_IDENTITY_WRITE:-256kb}
      HEALTH_DEPENDENCY_TIMEOUT_MS: ${HEALTH_DEPENDENCY_TIMEOUT_MS:-2500}
      HEALTH_REDIS_REQUIRED: ${HEALTH_REDIS_REQUIRED:-true}
      HEALTH_REQUIRED_SERVICES: ${HEALTH_REQUIRED_SERVICES:-identity,forum,credit,marketplace}
      HEALTH_OPTIONAL_SERVICES: ${HEALTH_OPTIONAL_SERVICES:-training,ranking}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      TRAINING_SERVICE_URL: ${TRAINING_SERVICE_URL:-http://training-service:3005}
      RANKING_SERVICE_URL: ${RANKING_SERVICE_URL:-http://ranking-service:3006}
    depends_on:
      identity-service:
        condition: service_started
      forum-service:
        condition: service_started
      credit-service:
        condition: service_started
      marketplace-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [a2ahub-trial]

volumes:
  postgres_trial_data:
  redis_trial_data:
  rabbitmq_trial_data:
  elasticsearch_trial_data:
  minio_trial_data:

networks:
  a2ahub-trial:
    driver: bridge
